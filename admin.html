<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Зарплаты - Администратор</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS removed — no longer needed with Billz auto-sync -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: #4f46e5 #1f2937;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 4px;
        }
        .glass-effect {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 70, 229, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
        }
        .pulse-highlight {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }
        .input-field {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.3);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        table {
            font-size: 0.875rem;
        }
        th {
            background: rgba(79, 70, 229, 0.1);
            border-bottom: 2px solid rgba(79, 70, 229, 0.3);
        }
        tr:hover {
            background: rgba(79, 70, 229, 0.05);
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .status-dot.disconnected {
            background: #ef4444;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AdminApp = () => {
            const [monthSheet, setMonthSheet] = useState('');
            const [processedData, setProcessedData] = useState(null);
            const [loadedFromDb, setLoadedFromDb] = useState(false);
            const [errors, setErrors] = useState([]);
            const [warnings, setWarnings] = useState([]);

            // Google Sheets integration
            const API_URL = 'https://script.google.com/macros/s/AKfycbwc5_r_FHiVrSiYxS2hUtkLgul8JV1lKyKmcQAkZahgyP60wcBvwMeMU5lu2AUoz1hh/exec';
            const [appsScriptUrl, setAppsScriptUrl] = useState(API_URL);
            const [sheetsConnected, setSheetsConnected] = useState(false);
            const [sheetsLoading, setSheetsLoading] = useState(false);
            const [savedMonths, setSavedMonths] = useState([]);
            const [savingToSheets, setSavingToSheets] = useState(false);

            const [shiftMonths, setShiftMonths] = useState([]);
            const [shiftsFromDb, setShiftsFromDb] = useState(null);
            const [advancesFromDb, setAdvancesFromDb] = useState(null);
            const [loadingShifts, setLoadingShifts] = useState(false);
            const [refreshingAdvances, setRefreshingAdvances] = useState(false);
            const [loadingTransactions, setLoadingTransactions] = useState(false);

            // Обновить авансы для уже сохранённого месяца (без перезагрузки файлов)
            const refreshAdvancesForMonth = async (month) => {
                setRefreshingAdvances(true);
                setErrors([]);
                try {
                    // 1. Загружаем текущие расчёты из базы
                    const salaryResp = await fetch(`${API_URL}?action=getSalaryData&month=${encodeURIComponent(month)}`, { method: 'GET', mode: 'cors' });
                    const salaryResult = await salaryResp.json();
                    if (!salaryResult.success || !salaryResult.data?.employees) {
                        setErrors(['Нет данных расчётов для ' + month]);
                        return;
                    }

                    // 2. Загружаем данные смен (там столбец "Выплачено" = авансы)
                    const shiftResp = await fetch(`${API_URL}?action=getShiftsData&month=${encodeURIComponent(month)}`, { method: 'GET', mode: 'cors' });
                    const shiftResult = await shiftResp.json();
                    if (!shiftResult.success || !shiftResult.data?.employees) {
                        setErrors(['Ошибка загрузки смен для ' + month]);
                        return;
                    }

                    // 3. Берём авансы из столбца "Выплачено" таблицы месяца
                    const advancesMap = {};
                    Object.entries(shiftResult.data.employees).forEach(([name, emp]) => {
                        if (emp.advancePaid && emp.advancePaid > 0) {
                            advancesMap[name] = emp.advancePaid;
                        }
                    });

                    // 4. Обновляем расчёты с новыми авансами
                    const employees = salaryResult.data.employees;
                    const updatedEmployees = {};
                    Object.entries(employees).forEach(([name, emp]) => {
                        const oldAdvances = emp.advances || 0;
                        const newAdvances = advancesMap[name] || 0;
                        const diff = newAdvances - oldAdvances;
                        updatedEmployees[name] = {
                            ...emp,
                            advances: newAdvances,
                            totalToPay: (emp.totalToPay || 0) - diff // уменьшаем к выплате на разницу авансов
                        };
                    });

                    // 5. Сохраняем обратно
                    const saveResp = await fetch(`${API_URL}?action=saveSalaryData`, {
                        method: 'POST',
                        mode: 'cors',
                        body: JSON.stringify({ month, employees: updatedEmployees })
                    });
                    const saveResult = await saveResp.json();

                    if (saveResult.success) {
                        // Показываем обновлённые данные
                        const emps = Object.values(updatedEmployees).map(emp => ({
                            ...emp,
                            bonusByCategory: emp.bonusByCategory || {},
                            sales: [],
                            dailySales: emp.dailySales || {},
                            shifts: emp.shifts || { shiftCount: 0, dailyPay: [], storeSchedule: [], totalShiftPay: emp.shiftPay || 0 }
                        }));
                        setProcessedData({
                            month,
                            employees: emps,
                            bestDay: salaryResult.data.bestDay || {},
                            topSeller: salaryResult.data.topSeller || {},
                            totalRevenue: emps.reduce((s, e) => s + (e.totalSales || 0), 0)
                        });
                        setLoadedFromDb(true);

                        const advSummary = Object.entries(advancesMap).map(([n, a]) => `${n}: ${a}`).join(', ');
                        setWarnings([`✅ Авансы обновлены за ${month}! ${advSummary}`]);
                    } else {
                        setErrors([`Ошибка сохранения: ${saveResult.message}`]);
                    }
                } catch (err) {
                    setErrors([`Ошибка: ${err.message}`]);
                } finally {
                    setRefreshingAdvances(false);
                }
            };

            // Автоподключение при загрузке
            useEffect(() => {
                (async () => {
                    setSheetsLoading(true);
                    try {
                        const response = await fetch(`${API_URL}?action=test`, { method: 'GET', mode: 'cors' });
                        const result = await response.json();
                        if (result.success) {
                            setSheetsConnected(true);
                            // Загрузить сохранённые месяцы расчётов
                            const mResp = await fetch(`${API_URL}?action=getMonths`, { method: 'GET', mode: 'cors' });
                            const mResult = await mResp.json();
                            if (mResult.success) setSavedMonths(mResult.data || []);

                            // Загрузить доступные месяцы смен
                            const smResp = await fetch(`${API_URL}?action=getShiftMonths`, { method: 'GET', mode: 'cors' });
                            const smResult = await smResp.json();
                            if (smResult.success && smResult.data) {
                                setShiftMonths(smResult.data);
                                if (smResult.data.length > 0) {
                                    setMonthSheet(smResult.data[0]);
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Auto-connect failed:', err);
                    } finally {
                        setSheetsLoading(false);
                    }
                })();
            }, []);

            // Загрузка смен и авансов из Google Sheets
            const loadShiftsFromDb = async (month) => {
                setLoadingShifts(true);
                setErrors([]);
                try {
                    // Загрузка смен
                    const shiftResp = await fetch(`${API_URL}?action=getShiftsData&month=${encodeURIComponent(month)}`, { method: 'GET', mode: 'cors' });
                    const shiftResult = await shiftResp.json();
                    if (shiftResult.success && shiftResult.data) {
                        setShiftsFromDb(shiftResult.data.employees);
                        setMonthSheet(month);
                    } else {
                        setErrors([`Ошибка загрузки смен: ${shiftResult.message || 'unknown'}`]);
                        return;
                    }

                    // Загрузка авансов
                    const advResp = await fetch(`${API_URL}?action=getAdvances`, { method: 'GET', mode: 'cors' });
                    const advResult = await advResp.json();
                    if (advResult.success && advResult.data) {
                        const advData = advResult.data.advances || advResult.data;
                        const debug = advResult.data.debug || {};
                        setAdvancesFromDb(Array.isArray(advData) ? advData : []);
                        console.log('=== ADVANCES DEBUG ===');
                        console.log('Total rows:', debug.totalRows);
                        console.log('Data rows:', debug.dataRows);
                        console.log('Headers:', debug.headers);
                        console.log('Month breakdown:', JSON.stringify(debug.monthBreakdown, null, 2));
                        console.log('All advances:', advData);
                        // Показать debug в warnings
                        const monthInfo = debug.monthBreakdown ? Object.entries(debug.monthBreakdown).map(([k,v]) => `${k}: ${v.count} записей, сумма ${v.sum}`).join('; ') : '';
                        setWarnings([`✅ Смены за ${month} загружены. Авансы: ${(Array.isArray(advData) ? advData : []).length} записей. Debug: ${monthInfo}`]);
                    } else {
                        setWarnings([`✅ Смены за ${month} загружены. Авансы: ошибка загрузки`]);
                    }
                } catch (err) {
                    setErrors([`Ошибка: ${err.message}`]);
                } finally {
                    setLoadingShifts(false);
                }
            };

            // parseExcelFile removed — transactions and catalog now load from Billz via DB

            const testSheetsConnection = async () => {
                if (!appsScriptUrl.trim()) {
                    setErrors(['Пожалуйста, введите URL Apps Script']);
                    return;
                }

                setSheetsLoading(true);
                try {
                    const response = await fetch(`${appsScriptUrl}?action=test`, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    const result = await response.json();
                    if (result.success) {
                        setSheetsConnected(true);
                        setErrors([]);
                        loadSavedMonths();
                    } else {
                        setErrors([`Ошибка подключения: ${result.message}`]);
                        setSheetsConnected(false);
                    }
                } catch (err) {
                    setErrors([`Ошибка подключения: ${err.message}`]);
                    setSheetsConnected(false);
                } finally {
                    setSheetsLoading(false);
                }
            };

            const loadSavedMonths = async () => {
                if (!appsScriptUrl.trim()) return;
                try {
                    const response = await fetch(`${appsScriptUrl}?action=getMonths`, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    const result = await response.json();
                    if (result.success) {
                        setSavedMonths(result.data || []);
                    }
                } catch (err) {
                    console.error('Failed to load months:', err);
                }
            };

            const saveToGoogleSheets = async () => {
                if (!processedData) {
                    setErrors(['Сначала рассчитайте зарплаты']);
                    return;
                }

                if (!sheetsConnected || !appsScriptUrl.trim()) {
                    setErrors(['Сначала подключитесь к Google Sheets']);
                    return;
                }

                setSavingToSheets(true);
                try {
                    // Save salary data
                    const salaryPayload = {
                        month: processedData.month,
                        employees: processedData.employees
                    };

                    const response = await fetch(`${appsScriptUrl}?action=saveSalaryData`, {
                        method: 'POST',
                        mode: 'cors',
                        body: JSON.stringify(salaryPayload)
                    });

                    const result = await response.json();
                    if (result.success) {
                        // Транзакции и каталог синхронизируются автоматически через Billz
                        // Сохраняем только расчёты зарплат

                        setErrors([]);
                        setWarnings([`Успешно сохранено в Google Sheets! Месяц: ${processedData.month}, Сотрудников: ${result.data.saved}`]);
                        await loadSavedMonths();
                    } else {
                        setErrors([`Ошибка сохранения: ${result.message}`]);
                    }
                } catch (err) {
                    setErrors([`Ошибка при отправке в Google Sheets: ${err.message}`]);
                } finally {
                    setSavingToSheets(false);
                }
            };

            // File upload handlers removed — data now comes from Billz auto-sync

            // Shift/advances file upload and extractShiftData removed — shifts load from Google Sheets API

            const processData = async () => {
                setLoadedFromDb(false);
                if (!shiftsFromDb || !monthSheet) {
                    setErrors(['Сначала загрузите смены (выберите месяц и нажмите "Загрузить смены")']);
                    return;
                }

                try {
                    // 1. Загружаем транзакции из базы (Billz auto-sync)
                    setLoadingTransactions(true);
                    setWarnings(['⏳ Загружаю транзакции из базы...']);
                    const txResp = await fetch(`${API_URL}?action=getTransactions&month=${encodeURIComponent(monthSheet)}`, { method: 'GET', mode: 'cors' });
                    const txResult = await txResp.json();
                    setLoadingTransactions(false);

                    if (!txResult.success || !txResult.data || !txResult.data.transactions) {
                        setErrors([`Ошибка загрузки транзакций: ${txResult.message || 'Нет данных'}`]);
                        return;
                    }

                    const transactions = txResult.data.transactions;
                    if (transactions.length === 0) {
                        setErrors([`Нет транзакций за ${monthSheet}. Убедитесь, что Billz синхронизация прошла успешно.`]);
                        return;
                    }

                    setWarnings([`📦 Загружено ${transactions.length} транзакций за ${monthSheet}. Рассчитываю...`]);

                    // 2. Смены из Google Sheets (уже загружены)
                    const shiftEmployees = shiftsFromDb;

                    const bonusCategories = {
                        'LED - Grow Lighting': 0.05,
                        'CBD > CBD Gorilla': 0.14,
                        'CBD > CBD Global': 0.07,
                        'CBD > CBD Other': 0.05
                    };

                    const employeeData = {};
                    const dailySales = {};

                    // Обрабатываем транзакции из БД — уже имеют короткие имена и категории
                    transactions.forEach(row => {
                        const shortName = row.cashier;
                        const date = row.date;
                        const sku = row.sku;
                        const category = row.category || 'Прочее';
                        const netRevenue = row.amount || 0;

                        if (!shortName) return;

                        if (!employeeData[shortName]) {
                            employeeData[shortName] = {
                                shortName: shortName,
                                shifts: shiftEmployees[shortName] || {},
                                sales: [],
                                dailySales: {},
                                bonusByCategory: {},
                                totalSales: 0,
                                totalBonus: 0,
                                bestDayBonus: 0,
                                topSellerBonus: 0
                            };
                        }

                        const bonusRate = bonusCategories[category] || 0;
                        const bonus = netRevenue * bonusRate;

                        if (!employeeData[shortName].bonusByCategory[category]) {
                            employeeData[shortName].bonusByCategory[category] = {
                                amount: 0,
                                bonus: 0,
                                rate: bonusRate
                            };
                        }

                        employeeData[shortName].bonusByCategory[category].amount += netRevenue;
                        employeeData[shortName].bonusByCategory[category].bonus += bonus;
                        employeeData[shortName].sales.push({
                            txId: row.id,
                            date,
                            store: row.store || '',
                            product: row.product,
                            sku: sku,
                            category,
                            amount: netRevenue,
                            bonus
                        });
                        employeeData[shortName].totalSales += netRevenue;
                        employeeData[shortName].totalBonus += bonus;

                        const key = `${shortName}_${date}`;
                        if (!dailySales[key]) dailySales[key] = 0;
                        dailySales[key] += netRevenue;
                        employeeData[shortName].dailySales[date] = (employeeData[shortName].dailySales[date] || 0) + netRevenue;
                    });

                    let bestDay = { employee: '', date: '', amount: 0 };
                    let topSeller = { employee: '', amount: 0 };

                    Object.entries(dailySales).forEach(([key, amount]) => {
                        const [employee, ...dateParts] = key.split('_');
                        const date = dateParts.join('_');
                        if (amount > bestDay.amount) {
                            bestDay = { employee, date, amount };
                        }
                    });

                    Object.entries(employeeData).forEach(([name, data]) => {
                        if (data.totalSales > topSeller.amount) {
                            topSeller = { employee: name, amount: data.totalSales };
                        }
                    });

                    if (bestDay.employee) {
                        employeeData[bestDay.employee].bestDayBonus = 100;
                    }
                    if (topSeller.employee) {
                        employeeData[topSeller.employee].topSellerBonus = topSeller.amount * 0.02;
                    }

                    // Авансы: берём из столбца "Выплачено" (advancePaid) таблицы смен
                    Object.entries(employeeData).forEach(([name, emp]) => {
                        if (emp.shifts && emp.shifts.advancePaid) {
                            emp.advances = emp.shifts.advancePaid;
                        }
                    });

                    Object.values(employeeData).forEach(emp => {
                        emp.shiftPay = emp.shifts.totalShiftPay || 0;
                        emp.advances = emp.advances || 0;
                        emp.totalToPay = emp.shiftPay + emp.totalBonus + emp.bestDayBonus + emp.topSellerBonus + (emp.shifts.reviewsBonus || 0) + (emp.shifts.management || 0) - (emp.shifts.inventoryDeduction || 0) - emp.advances;
                    });

                    setProcessedData({
                        employees: employeeData,
                        bestDay,
                        topSeller,
                        month: monthSheet,
                        totalRevenue: Object.values(employeeData).reduce((s, e) => s + e.totalSales, 0)
                    });
                    setErrors([]);
                    setWarnings([`✅ Расчёт завершён: ${Object.keys(employeeData).length} сотрудников, ${transactions.length} транзакций`]);
                } catch (err) {
                    setErrors([`Ошибка при обработке данных: ${err.message}`]);
                    console.error(err);
                    setLoadingTransactions(false);
                }
            };

            // Name mapping removed — handled server-side in Apps Script NAME_MAP

            const exportData = () => {
                if (!processedData) {
                    setErrors(['Сначала рассчитайте зарплаты']);
                    return;
                }
                try {
                    const exportPayload = {
                        month: processedData.month,
                        exportDate: new Date().toISOString(),
                        employees: processedData.employees,
                        bestDay: processedData.bestDay,
                        topSeller: processedData.topSeller
                    };

                    const jsonStr = JSON.stringify(exportPayload, null, 2);
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');

                    const monthName = processedData.month.replace(/_/g, '_');
                    link.href = url;
                    link.download = `salary-data-${monthName}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    setErrors([`Ошибка при экспорте: ${err.message}`]);
                }
            };

            return (
                <div className="min-h-screen bg-gray-950">
                    {/* Header */}
                    <div className="glass-effect border-b border-gray-800 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <h1 className="text-3xl font-bold gradient-text mb-2">
                                💼 Панель Администратора - Калькулятор Зарплаты
                            </h1>
                            <p className="text-sm text-gray-400">Загрузка данных, обработка и экспорт для сотрудников</p>
                        </div>
                    </div>

                    {/* Alerts */}
                    {errors.length > 0 && (
                        <div className="max-w-7xl mx-auto px-4 mt-4">
                            {errors.map((err, idx) => (
                                <div key={idx} className="bg-red-900/30 border border-red-700 text-red-100 px-4 py-3 rounded-lg mb-2">
                                    ⚠️ {err}
                                </div>
                            ))}
                        </div>
                    )}
                    {warnings.length > 0 && (
                        <div className="max-w-7xl mx-auto px-4 mt-4">
                            {warnings.map((warn, idx) => (
                                <div key={idx} className="bg-yellow-900/30 border border-yellow-700 text-yellow-100 px-4 py-3 rounded-lg mb-2">
                                    ℹ️ {warn}
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="space-y-6">
                            {/* Google Sheets Connection Status */}
                            <div className="glass-effect rounded-lg p-4 border border-purple-500/50 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <span className={`status-dot ${sheetsConnected ? 'connected' : 'disconnected'}`}></span>
                                    <span className="font-medium">
                                        {sheetsLoading ? '⏳ Подключение к Google Sheets...' : sheetsConnected ? '📡 Google Sheets подключено' : '❌ Нет подключения к Google Sheets'}
                                    </span>
                                </div>
                                {!sheetsConnected && !sheetsLoading && (
                                    <button
                                        onClick={testSheetsConnection}
                                        className="btn-primary px-4 py-2 rounded-lg text-white text-sm font-bold"
                                    >
                                        Повторить
                                    </button>
                                )}
                            </div>

                            {/* Saved Months + Load from DB */}
                            {savedMonths.length > 0 && (
                                <div className="glass-effect rounded-lg p-4">
                                    <h3 className="text-sm font-bold mb-3">📂 Данные в базе Google Sheets:</h3>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {savedMonths.map(month => (
                                            <button
                                                key={month}
                                                onClick={async () => {
                                                    setWarnings([`⏳ Загрузка данных за ${month}...`]);
                                                    try {
                                                        const resp = await fetch(`${appsScriptUrl}?action=getSalaryData&month=${encodeURIComponent(month)}`, { method: 'GET', mode: 'cors' });
                                                        const result = await resp.json();
                                                        if (result.success && result.data && result.data.employees) {
                                                            const emps = Object.values(result.data.employees).map(emp => ({
                                                                ...emp,
                                                                bonusByCategory: emp.bonusByCategory || {},
                                                                sales: [],
                                                                dailySales: emp.dailySales || {},
                                                                shifts: emp.shifts || { shiftCount: 0, dailyPay: [], storeSchedule: [], totalShiftPay: emp.shiftPay || 0 }
                                                            }));
                                                            setProcessedData({
                                                                month,
                                                                employees: emps,
                                                                bestDay: result.data.bestDay || {},
                                                                topSeller: result.data.topSeller || {},
                                                                totalRevenue: emps.reduce((s, e) => s + (e.totalSales || 0), 0)
                                                            });
                                                            setLoadedFromDb(true);
                                                            setWarnings([`✅ Загружено из базы: ${month}, ${emps.length} сотрудников`]);
                                                            setErrors([]);
                                                        } else {
                                                            setErrors(['Ошибка загрузки данных из базы']);
                                                        }
                                                    } catch (err) {
                                                        setErrors([`Ошибка: ${err.message}`]);
                                                    }
                                                }}
                                                className="bg-green-900/30 border border-green-700 text-green-300 px-4 py-2 rounded text-sm hover:bg-green-800/50 transition cursor-pointer font-medium"
                                            >
                                                📥 {month}
                                            </button>
                                        ))}
                                    </div>
                                    <p className="text-xs text-gray-500">Нажмите на месяц, чтобы загрузить расчёт из базы без файлов</p>
                                    {processedData && loadedFromDb && (
                                        <button
                                            onClick={() => refreshAdvancesForMonth(processedData.month)}
                                            disabled={refreshingAdvances}
                                            className="bg-orange-900/30 border border-orange-600 text-orange-300 px-4 py-2 rounded text-sm hover:bg-orange-800/50 transition cursor-pointer font-medium disabled:opacity-50 mt-2"
                                        >
                                            {refreshingAdvances ? '⏳ Обновляю...' : `🔄 Обновить авансы для ${processedData.month}`}
                                        </button>
                                    )}
                                </div>
                            )}

                            {/* Shifts from Google Sheets */}
                            {shiftMonths.length > 0 && (
                                <div className="glass-effect rounded-lg p-6 border border-blue-500/30">
                                    <h2 className="text-lg font-bold mb-3">📅 Смены и авансы (Google Sheets)</h2>
                                    <p className="text-xs text-gray-400 mb-3">Загружаются автоматически из таблицы графика смен</p>
                                    <div className="flex gap-3 items-end">
                                        <div className="flex-1">
                                            <label className="block text-sm font-medium mb-2">Выберите месяц:</label>
                                            <select
                                                value={monthSheet}
                                                onChange={(e) => setMonthSheet(e.target.value)}
                                                className="input-field w-full px-4 py-3 rounded-lg text-white focus:outline-none"
                                            >
                                                {shiftMonths.map(month => (
                                                    <option key={month} value={month}>{month}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <button
                                            onClick={() => loadShiftsFromDb(monthSheet)}
                                            disabled={loadingShifts || !monthSheet}
                                            className="btn-primary px-6 py-3 rounded-lg text-white font-bold disabled:opacity-40"
                                        >
                                            {loadingShifts ? '⏳ Загрузка...' : '📥 Загрузить смены'}
                                        </button>
                                    </div>
                                    {shiftsFromDb && (
                                        <div className="mt-3 text-sm text-green-400">
                                            ✅ Смены загружены: {Object.keys(shiftsFromDb).length} сотрудников
                                            {advancesFromDb && `, авансы: ${advancesFromDb.length} записей`}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Billz auto-sync info */}
                            <div className="glass-effect rounded-lg p-4 border border-green-500/30">
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl">🔄</span>
                                    <div>
                                        <div className="font-medium text-green-400">Billz Auto-Sync</div>
                                        <div className="text-sm text-gray-400">Транзакции и каталог синхронизируются автоматически каждый день в 11:00. Маппинг имён настроен на сервере.</div>
                                    </div>
                                </div>
                            </div>

                            {/* Process & Save */}
                            <div className="space-y-4">
                                {!loadedFromDb && (
                                    <button
                                        onClick={processData}
                                        disabled={loadingTransactions || !shiftsFromDb}
                                        className="btn-primary w-full px-6 py-3 rounded-lg text-white font-bold text-lg disabled:opacity-50"
                                    >
                                        {loadingTransactions ? '⏳ Загрузка транзакций...' : '✨ Рассчитать Зарплаты'}
                                    </button>
                                )}

                                {processedData && sheetsConnected && !loadedFromDb && (
                                    <button
                                        onClick={saveToGoogleSheets}
                                        disabled={savingToSheets}
                                        className="btn-primary w-full px-6 py-3 rounded-lg text-white font-bold text-lg disabled:opacity-50"
                                    >
                                        {savingToSheets ? '⏳ Сохраняю...' : '💾 Сохранить в Google Sheets'}
                                    </button>
                                )}
                            </div>

                            {/* Dashboard */}
                            {processedData && (
                                <SalaryDashboard processedData={processedData} />
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="glass-effect rounded-lg p-4 text-center text-gray-400 text-sm">
                            📊 Версия 4.0 | Billz Auto-Sync + Google Sheets
                        </div>
                    </div>
                </div>
            );
        };

        // FileUploadZone removed — no longer needed with Billz auto-sync

        const SalaryDashboard = ({ processedData }) => {
            const employees = Object.values(processedData.employees).sort((a, b) =>
                b.totalSales - a.totalSales
            );

            return (
                <div className="space-y-6">
                    {/* Award Cards — above the table */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {processedData.bestDay?.employee && (
                            <div className="glass-effect rounded-lg p-5 card-hover pulse-highlight border border-yellow-700/50">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="text-4xl">🏆</div>
                                    <div>
                                        <div className="text-sm text-gray-400">Лучший день месяца</div>
                                        <div className="text-xl font-bold text-yellow-400">{processedData.bestDay.employee}</div>
                                    </div>
                                </div>
                                <div className="text-lg font-bold">{(processedData.bestDay.amount || 0).toFixed(2)} ГЕЛ за день</div>
                                <div className="text-xs text-gray-500">{processedData.bestDay.date || ''}</div>
                                <div className="text-sm text-green-400 font-bold mt-2">+100 ГЕЛ бонус</div>
                            </div>
                        )}
                        {processedData.topSeller?.employee && (
                            <div className="glass-effect rounded-lg p-5 card-hover border border-green-700/50 bg-green-900/10">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="text-4xl">👑</div>
                                    <div>
                                        <div className="text-sm text-gray-400">Топ продавец месяца</div>
                                        <div className="text-xl font-bold text-green-400">{processedData.topSeller.employee}</div>
                                    </div>
                                </div>
                                <div className="text-lg font-bold">{(processedData.topSeller.amount || 0).toFixed(2)} ГЕЛ продаж</div>
                                <div className="text-sm text-green-400 font-bold mt-2">+{((processedData.topSeller.amount || 0) * 0.02).toFixed(2)} ГЕЛ бонус (2%)</div>
                            </div>
                        )}
                        <div className="glass-effect rounded-lg p-5 card-hover">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="text-4xl">📈</div>
                                <div>
                                    <div className="text-sm text-gray-400">Месяц: {processedData.month}</div>
                                    <div className="text-xl font-bold">{Object.keys(processedData.employees).length} сотрудников</div>
                                </div>
                            </div>
                            <div className="text-lg font-bold">Выручка: {(processedData.totalRevenue || 0).toFixed(2)} ГЕЛ</div>
                        </div>
                    </div>

                    <div className="glass-effect rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-4">📊 Сводка по Зарплатам</h2>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead>
                                    <tr>
                                        <th className="text-left px-3 py-2">Имя</th>
                                        <th className="text-right px-3 py-2">Смены</th>
                                        <th className="text-right px-3 py-2">Оклад (ГЕЛ)</th>
                                        <th className="text-right px-3 py-2">Продажи (ГЕЛ)</th>
                                        <th className="text-right px-3 py-2">LED</th>
                                        <th className="text-right px-3 py-2">CBD Gorilla</th>
                                        <th className="text-right px-3 py-2">CBD Global</th>
                                        <th className="text-right px-3 py-2">CBD Other</th>
                                        <th className="text-right px-3 py-2">Бонус продажи</th>
                                        <th className="text-right px-3 py-2">🏆 Луч. день</th>
                                        <th className="text-right px-3 py-2">👑 Топ прод.</th>
                                        <th className="text-right px-3 py-2">Авансы</th>
                                        <th className="text-right px-3 py-2">К выплате (ГЕЛ)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {employees.map((emp, idx) => (
                                        <tr
                                            key={idx}
                                            className={`${
                                                emp.shortName === processedData.bestDay.employee ? 'pulse-highlight' : ''
                                            } ${
                                                emp.shortName === processedData.topSeller.employee ? 'bg-green-900/20' : ''
                                            }`}
                                        >
                                            <td className="px-3 py-2 font-medium">
                                                {emp.shortName}
                                                {emp.shortName === processedData.bestDay.employee && ' 🏆'}
                                                {emp.shortName === processedData.topSeller.employee && ' 👑'}
                                            </td>
                                            <td className="text-right px-3 py-2">{emp.shifts.shiftCount || 0}</td>
                                            <td className="text-right px-3 py-2">{emp.shiftPay.toFixed(2)}</td>
                                            <td className="text-right px-3 py-2 font-medium">{emp.totalSales.toFixed(2)}</td>
                                            <td className="text-right px-3 py-2 text-sm">
                                                {(emp.bonusByCategory['LED - Grow Lighting']?.bonus || 0).toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 text-sm">
                                                {(emp.bonusByCategory['CBD > CBD Gorilla']?.bonus || 0).toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 text-sm">
                                                {(emp.bonusByCategory['CBD > CBD Global']?.bonus || 0).toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 text-sm">
                                                {(emp.bonusByCategory['CBD > CBD Other']?.bonus || 0).toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 font-medium text-yellow-400">
                                                {(emp.totalBonus || 0).toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 font-medium">
                                                {(emp.bestDayBonus || 0) > 0
                                                    ? <span className="text-yellow-400">+{(emp.bestDayBonus).toFixed(0)}</span>
                                                    : <span className="text-gray-600">—</span>
                                                }
                                            </td>
                                            <td className="text-right px-3 py-2 font-medium">
                                                {(emp.topSellerBonus || 0) > 0
                                                    ? <span className="text-green-400">+{(emp.topSellerBonus).toFixed(2)}</span>
                                                    : <span className="text-gray-600">—</span>
                                                }
                                            </td>
                                            <td className="text-right px-3 py-2 text-red-400">
                                                {emp.advances.toFixed(2)}
                                            </td>
                                            <td className="text-right px-3 py-2 font-bold text-green-400">
                                                {emp.totalToPay.toFixed(2)}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot>
                                    {(() => {
                                        const totals = employees.reduce((acc, emp) => ({
                                            shifts: acc.shifts + (emp.shifts.shiftCount || 0),
                                            shiftPay: acc.shiftPay + emp.shiftPay,
                                            sales: acc.sales + emp.totalSales,
                                            led: acc.led + (emp.bonusByCategory['LED - Grow Lighting']?.bonus || 0),
                                            gorilla: acc.gorilla + (emp.bonusByCategory['CBD > CBD Gorilla']?.bonus || 0),
                                            global: acc.global + (emp.bonusByCategory['CBD > CBD Global']?.bonus || 0),
                                            other: acc.other + (emp.bonusByCategory['CBD > CBD Other']?.bonus || 0),
                                            salesBonus: acc.salesBonus + (emp.totalBonus || 0),
                                            bestDay: acc.bestDay + (emp.bestDayBonus || 0),
                                            topSeller: acc.topSeller + (emp.topSellerBonus || 0),
                                            advances: acc.advances + emp.advances,
                                            toPay: acc.toPay + emp.totalToPay
                                        }), { shifts: 0, shiftPay: 0, sales: 0, led: 0, gorilla: 0, global: 0, other: 0, salesBonus: 0, bestDay: 0, topSeller: 0, advances: 0, toPay: 0 });
                                        return (
                                            <tr className="border-t-2 border-gray-500 bg-gray-800/50 font-bold">
                                                <td className="px-3 py-2">ИТОГО</td>
                                                <td className="text-right px-3 py-2">{totals.shifts}</td>
                                                <td className="text-right px-3 py-2">{totals.shiftPay.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2">{totals.sales.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-sm">{totals.led.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-sm">{totals.gorilla.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-sm">{totals.global.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-sm">{totals.other.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-yellow-400">{totals.salesBonus.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-yellow-400">{totals.bestDay.toFixed(0)}</td>
                                                <td className="text-right px-3 py-2 text-green-400">{totals.topSeller.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-red-400">{totals.advances.toFixed(2)}</td>
                                                <td className="text-right px-3 py-2 text-green-400">{totals.toPay.toFixed(2)}</td>
                                            </tr>
                                        );
                                    })()}
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    {/* Summary cards moved above the table */}
                </div>
            );
        };

        ReactDOM.render(<AdminApp />, document.getElementById('root'));
    </script>
</body>
</html>
