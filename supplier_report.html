/* ============================================================
 *  Helpers
 * ============================================================ */
const pad = n => (n < 10 ? '0' + n : '' + n);
const fmt = d => d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
const shortDM = d => pad(d.getDate()) + '.' + pad(d.getMonth() + 1);
const today = () => fmt(new Date());

function mondayOf(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = x.getDay();
  const delta = dow === 0 ? -6 : 1 - dow;
  x.setDate(x.getDate() + delta);
  return x;
}
function weeksOfYear(year) {
  const t = new Date();
  let cursor = mondayOf(new Date(year, 0, 1));
  if (cursor.getFullYear() < year) cursor.setDate(cursor.getDate() + 7);
  const out = [];
  let n = 1;
  while (cursor.getFullYear() === year && cursor <= t) {
    const start = new Date(cursor);
    const end = new Date(cursor); end.setDate(end.getDate() + 6);
    out.push({ n: n++, start: fmt(start), end: fmt(end), label: shortDM(start) + '–' + shortDM(end) });
    cursor.setDate(cursor.getDate() + 7);
  }
  return out;
}
function currentWeekRange() {
  const m = mondayOf(new Date());
  const e = new Date(m); e.setDate(e.getDate() + 6);
  return { from: fmt(m), to: fmt(e) };
}

const fmtMoney = n => (n == null || isNaN(n)) ? '—'
  : new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
const fmtInt = n => (n == null || isNaN(n)) ? '—' : new Intl.NumberFormat('ru-RU').format(n);

/* ============================================================
 *  API
 * ============================================================ */
async function apiGet(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  for (const k in params) if (params[k] != null) url.searchParams.set(k, params[k]);
  const r = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  if (json.error) throw new Error(json.error);
  return json;
}
async function apiPost(payload) {
  const r = await fetch(API_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  if (json.error) throw new Error(json.error);
  return json;
}

/* ============================================================
 *  XLSX export
 * ============================================================ */
function exportXlsx(report, S) {
  const period = report.period;
  const headers = [
    S.col_product === 'Товар' ? 'Дата' : 'Date',
    S.col_product === 'Товар' ? 'Поставщик' : 'Supplier',
    S.col_product, S.col_sku, S.col_product === 'Товар' ? 'Штрихкод' : 'Barcode',
    S.col_product === 'Товар' ? 'Категория' : 'Category', S.col_brand,
    S.col_qty, S.col_returned, S.col_product === 'Товар' ? 'Чистое кол-во' : 'Net qty',
    S.col_supply, S.col_cb_pct, S.col_cashback
  ];
  const aoa = [headers];
  report.rows.forEach((r, idx) => {
    aoa.push([
      period, r.supplierName, r.name, r.sku, r.barcode, r.categories, r.brand,
      r.soldQty, r.returnedQty, r.netSoldQty,
      r.soldSupplySum,
      r.cashbackRate,
      { f: `K${idx + 2}/100*${r.cashbackRate}` }
    ]);
  });
  const last = report.rows.length + 1;
  aoa.push(['', '', '', '', '', '', '',
    { f: `SUM(H2:H${last})` }, { f: `SUM(I2:I${last})` }, { f: `SUM(J2:J${last})` },
    { f: `SUM(K2:K${last})` }, '',
    { f: `SUM(M2:M${last})` }
  ]);
  const sumRowIdx = last + 1;
  aoa.push([]);
  const totalRow = new Array(13).fill('');
  totalRow[10] = S.stat_to_pay + ':';
  totalRow[12] = { f: `K${sumRowIdx}-M${sumRowIdx}` };
  aoa.push(totalRow);

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    { wch: 22 }, { wch: 18 }, { wch: 42 }, { wch: 12 }, { wch: 14 },
    { wch: 22 }, { wch: 14 }, { wch: 12 }, { wch: 10 }, { wch: 12 },
    { wch: 12 }, { wch: 10 }, { wch: 12 }
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  const safeSup = SUPPLIER.replace(/[^A-Za-zА-Яа-я0-9_-]+/g, '_');
  const safePer = period.replace(/\s/g, '');
  XLSX.writeFile(wb, `Report_${safeSup}_${safePer}.xlsx`);
}

/* ============================================================
 *  TAB: SALES
 * ============================================================ */
function SalesTab({ year, setError, S }) {
  const initial = currentWeekRange();
  const [from, setFrom] = React.useState(initial.from);
  const [to, setTo]     = React.useState(initial.to);
  const [report, setReport] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [activeWeek, setActiveWeek] = React.useState(null);
  const weeks = React.useMemo(() => weeksOfYear(year), [year]);

  React.useEffect(() => {
    const cur = weeks.find(w => w.start === initial.from && w.end === initial.to);
    if (cur) setActiveWeek(cur.n);
    load(initial.from, initial.to);
  }, []);

  async function load(f, t) {
    setLoading(true); setError('');
    try { setReport(await apiGet('getSupplierReport', { from: f, to: t, supplier: SUPPLIER })); }
    catch (e) { setError(S.err_sales + e.message); }
    finally { setLoading(false); }
  }
  function pickWeek(w) { setFrom(w.start); setTo(w.end); setActiveWeek(w.n); load(w.start, w.end); }

  return (
    <>
      <section className="glass rounded-2xl p-4 md:p-5 mb-5">
        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
          <label className="md:col-span-3">
            <div className="text-xs text-slate-400 mb-1">{S.from}</div>
            <input type="date" value={from} onChange={e => { setFrom(e.target.value); setActiveWeek(null); }} className="w-full" />
          </label>
          <label className="md:col-span-3">
            <div className="text-xs text-slate-400 mb-1">{S.to}</div>
            <input type="date" value={to} onChange={e => { setTo(e.target.value); setActiveWeek(null); }} className="w-full" />
          </label>
          <div className="md:col-span-3">
            <button onClick={() => load(from, to)} disabled={loading} className="btn-primary w-full">
              {loading ? S.btn_loading : S.btn_form}
            </button>
          </div>
          <div className="md:col-span-3">
            <button onClick={() => exportXlsx(report, S)} disabled={!report || !report.rows.length} className="btn-emerald w-full">{S.btn_xlsx}</button>
          </div>
        </div>
        <div className="mt-4">
          <div className="text-xs text-slate-400 mb-2">{S.weeks_of} {year} {S.weeks_suffix}</div>
          <div className="week-strip">
            {weeks.map(w => (
              <button key={w.n} onClick={() => pickWeek(w)} title={w.start + ' → ' + w.end}
                      className={'pill px-3 py-1.5 rounded-md text-xs flex-shrink-0 ' + (activeWeek === w.n ? 'active' : '')}>
                <span className="font-mono">W{w.n}</span> · {w.label}
              </button>
            ))}
          </div>
        </div>
      </section>

      {report && (
        <section className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
          <Stat label={S.stat_period} value={report.period} mono />
          <Stat label={S.stat_supplier} value={SUPPLIER} />
          <Stat label={S.stat_supply} value={fmtMoney(report.totals.soldSupplySum) + ' ' + CURRENCY} />
          <Stat label={S.stat_cashback} value={fmtMoney(report.totals.cashback) + ' ' + CURRENCY} accent />
          <Stat label={S.stat_to_pay} value={fmtMoney(report.totals.toPaySupplier) + ' ' + CURRENCY} bold />
        </section>
      )}

      <section className="glass rounded-2xl p-2 md:p-3">
        <div className="scroll-x">
          <table className="w-full text-sm">
            <thead className="text-slate-400">
              <tr>
                <th className="text-left  px-3 py-2">{S.col_product}</th>
                <th className="text-left  px-3 py-2">{S.col_sku}</th>
                <th className="text-left  px-3 py-2">{S.col_brand}</th>
                <th className="text-right px-3 py-2">{S.col_qty}</th>
                <th className="text-right px-3 py-2">{S.col_returned}</th>
                <th className="text-right px-3 py-2">{S.col_supply}</th>
                <th className="text-right px-3 py-2">{S.col_cb_pct}</th>
                <th className="text-right px-3 py-2">{S.col_cashback}</th>
              </tr>
            </thead>
            <tbody>
              {(!report || !report.rows.length) && (
                <tr><td colSpan={8} className="text-center text-slate-500 py-10">{loading ? S.btn_loading : S.no_data}</td></tr>
              )}
              {report && report.rows.map(r => {
                const overridden = r.cashbackRate !== 10;
                return (
                  <tr key={r.sku} className="border-t border-white/5">
                    <td className="px-3 py-2">{r.name}</td>
                    <td className="px-3 py-2 font-mono text-slate-300">{r.sku}</td>
                    <td className="px-3 py-2 text-slate-400">{r.brand}</td>
                    <td className="num px-3 py-2">{fmtInt(r.soldQty)}</td>
                    <td className="num px-3 py-2 text-slate-500">{fmtInt(r.returnedQty)}</td>
                    <td className="num px-3 py-2 text-slate-300">{fmtMoney(r.soldSupplySum)}</td>
                    <td className={'num px-3 py-2 ' + (overridden ? 'text-amber-300 font-medium' : 'text-slate-400')}>{r.cashbackRate}%</td>
                    <td className="num px-3 py-2 text-emerald-300 font-medium">{fmtMoney(r.cashback)}</td>
                  </tr>
                );

              {report && report.rows.length > 0 && (
                <tr className="border-t-2 border-white/20 font-semibold">

                  <td className="num px-3 py-2 text-emerald-300">{fmtMoney(report.totals.cashback)}</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>

    </>
  );
}

        <div className="flex flex-wrap items-end gap-3">
          <label>
            <div className="text-xs text-slate-400 mb-1">{S.pin_label}</div>
            <input type="password" value={pin} onChange={e => setPin(e.target.value)} placeholder="••••" className="w-40" />
          </label>
          <p className="text-xs text-slate-500 max-w-md">{S.pin_help}</p>
        </div>
      </section>

      <div className="grid md:grid-cols-2 gap-5">
        <PaymentBlock title={S.title_supplier_payment} type="supplier" pin={pin} setError={setError} S={S} />
        <PaymentBlock title={S.title_cashback_received} type="cashback" pin={pin} setError={setError} S={S} />
      </div>
    </>
  );
}

function PaymentBlock({ title, type, pin, setError, S }) {
  const [items, setItems] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [date, setDate] = React.useState(today());
  const [amount, setAmount] = React.useState('');
  const [note, setNote] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);

  async function reload() {
    setLoading(true);
    try {
      const r = await apiGet('listPayments', { type, supplier: SUPPLIER });
      setItems(r.rows || []);
    } catch (e) { setError(title + ': ' + e.message); }
    finally { setLoading(false); }
  }
  React.useEffect(() => { reload(); }, [type]);

  async function add() {
    if (!amount || !date) return;
    setSubmitting(true); setError('');
    try {
      await apiPost({ action: 'addPayment', type, supplier: SUPPLIER, date, amount: Number(amount), note, pin });
      setAmount(''); setNote('');
      reload();
    } catch (e) { setError(title + ': ' + e.message); }
    finally { setSubmitting(false); }
  }
  async function remove(id) {
    if (!confirm(S.delete_confirm)) return;
    try { await apiPost({ action: 'deletePayment', type, id, pin }); reload(); }
    catch (e) { setError(title + ': ' + e.message); }
  }

  const total = items.reduce((s, x) => s + (x.amount || 0), 0);

  return (
    <section className="glass rounded-2xl p-4 md:p-5">
      <h3 className="text-lg font-medium mb-1">{title}</h3>
      <p className="text-xs text-slate-400 mb-4">{SUPPLIER}</p>

      <div className="grid grid-cols-1 sm:grid-cols-12 gap-2 mb-4">
        <input type="date" value={date} onChange={e => setDate(e.target.value)} className="sm:col-span-3" />
        <input type="number" step="0.01" min="0" placeholder={S.payment_amount} value={amount} onChange={e => setAmount(e.target.value)} className="sm:col-span-3" />
        <input type="text" placeholder={S.payment_note} value={note} onChange={e => setNote(e.target.value)} className="sm:col-span-4" />
        <button onClick={add} disabled={submitting || !amount} className="btn-primary sm:col-span-2">
          {submitting ? S.btn_adding : S.btn_add}
        </button>
      </div>

      <div className="rounded-xl border border-white/5 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="text-slate-400 bg-slate-900/50">
            <tr>
              <th className="text-left  px-3 py-2 w-28">{S.payment_date}</th>
              <th className="text-right px-3 py-2 w-32">{S.payment_amount}</th>
              <th className="text-left  px-3 py-2">{S.payment_comment}</th>
              <th className="px-3 py-2 w-12"></th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr><td colSpan={4} className="text-center text-slate-500 py-6">{S.p_loading}</td></tr>}
            {!loading && !items.length && <tr><td colSpan={4} className="text-center text-slate-500 py-6">{S.no_records}</td></tr>}
            {items.map(it => (
              <tr key={it.id} className="border-t border-white/5">
                <td className="px-3 py-2 font-mono text-slate-300">{it.date}</td>
                <td className="num px-3 py-2 font-medium">{fmtMoney(it.amount)} {CURRENCY}</td>
                <td className="px-3 py-2 text-slate-400">{it.note || <span className="text-slate-600">—</span>}</td>
                <td className="px-3 py-2 text-right">
                  <button className="btn-danger" onClick={() => remove(it.id)} title={it.enteredAt}>✕</button>
                </td>
              </tr>
            ))}
            {items.length > 0 && (
              <tr className="border-t-2 border-white/20 font-semibold bg-slate-900/30">
                <td className="px-3 py-2">{S.total}</td>
                <td className="num px-3 py-2 text-blue-300">{fmtMoney(total)} {CURRENCY}</td>
                <td colSpan={2} className="px-3 py-2 text-slate-500 text-xs">{items.length}{S.records_count}</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </section>
  );
}

/* ============================================================
 *  TAB: RECONCILIATION
 * ============================================================ */
function ReconTab({ year, setError, S }) {
  const yearStart = year + '-01-01';
  const [from, setFrom] = React.useState(yearStart);
  const [to, setTo] = React.useState(today());
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  async function load() {
    setLoading(true); setError('');
    try { setData(await apiGet('getReconciliation', { from, to, supplier: SUPPLIER })); }
    catch (e) { setError(S.err_recon + e.message); }
    finally { setLoading(false); }
  }
  React.useEffect(() => { load(); }, []);

  return (
    <>
      <section className="glass rounded-2xl p-4 md:p-5 mb-5">
        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
          <label className="md:col-span-4">
            <div className="text-xs text-slate-400 mb-1">{S.from}</div>
            <input type="date" value={from} onChange={e => setFrom(e.target.value)} className="w-full" />
          </label>
          <label className="md:col-span-4">
            <div className="text-xs text-slate-400 mb-1">{S.to}</div>
            <input type="date" value={to} onChange={e => setTo(e.target.value)} className="w-full" />
          </label>
          <div className="md:col-span-4">
            <button onClick={load} disabled={loading} className="btn-primary w-full">
              {loading ? S.btn_recalc_loading : S.btn_recalc}
            </button>
          </div>
        </div>
      </section>

      {data && (
        <>
          <section className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
            <Stat label={S.stat_supply_sold} value={fmtMoney(data.totals.supply) + ' ' + CURRENCY} />
            <Stat label={S.stat_cashback_due} value={fmtMoney(data.totals.cashback) + ' ' + CURRENCY} accent />
            <Stat label={S.stat_supplier_paid} value={fmtMoney(data.totals.supplierPaid) + ' ' + CURRENCY} />
            <Stat label={S.stat_cashback_received} value={fmtMoney(data.totals.cashbackPaid) + ' ' + CURRENCY} accent />
            <Stat label={S.stat_balance} value={(data.totals.netBalance >= 0 ? S.balance_owe : S.balance_overpaid) + fmtMoney(Math.abs(data.totals.netBalance)) + ' ' + CURRENCY} bold />
          </section>

          <section className="grid grid-cols-2 md:grid-cols-2 gap-3 mb-5">
            <Stat label={S.stat_supplier_debt} value={fmtMoney(data.totals.supplierDebt) + ' ' + CURRENCY} bold />
            <Stat label={S.stat_cashback_debt} value={fmtMoney(data.totals.cashbackDebt) + ' ' + CURRENCY} bold accent />
          </section>

          <section className="glass rounded-2xl p-2 md:p-3">
            <div className="scroll-x">
              <table className="w-full text-sm">
                <thead className="text-slate-400">
                  <tr>
                    <th className="text-left  px-3 py-2">{S.col_week}</th>
                    <th className="text-left  px-3 py-2">{S.col_period_short}</th>
                    <th className="text-right px-3 py-2">{S.col_supply}</th>
                    <th className="text-right px-3 py-2">{S.col_cashback}</th>
                    <th className="text-right px-3 py-2">{S.col_paid_short}</th>
                    <th className="text-right px-3 py-2">{S.col_received_short}</th>
                    <th className="text-right px-3 py-2">{S.col_debt_supplier}</th>
                    <th className="text-right px-3 py-2">{S.col_debt_cb}</th>
                  </tr>
                </thead>
                <tbody>
                  {!data.weeks.length && (
                    <tr><td colSpan={8} className="text-center text-slate-500 py-10">{S.no_data}</td></tr>
                  )}
                  {data.weeks.map(w => {
                    const empty = !w.supply && !w.cashback && !w.supplierPaid && !w.cashbackPaid;
                    return (
                      <tr key={w.from} className={'border-t border-white/5 ' + (empty ? 'opacity-40' : '')}>
                        <td className="px-3 py-2 font-mono">W{w.n}</td>
                        <td className="px-3 py-2 text-slate-300">{w.from} → {w.to}</td>
                        <td className="num px-3 py-2">{fmtMoney(w.supply)}</td>
                        <td className="num px-3 py-2 text-emerald-300">{fmtMoney(w.cashback)}</td>
                        <td className="num px-3 py-2 text-blue-300">{fmtMoney(w.supplierPaid)}</td>
                        <td className="num px-3 py-2 text-amber-300">{fmtMoney(w.cashbackPaid)}</td>
                        <td className={'num px-3 py-2 ' + (w.supplierDebt > 0 ? 'text-orange-300' : 'text-slate-500')}>{fmtMoney(w.supplierDebt)}</td>
                        <td className={'num px-3 py-2 ' + (w.cashbackDebt > 0 ? 'text-amber-300' : 'text-slate-500')}>{fmtMoney(w.cashbackDebt)}</td>
                      </tr>
                    );
                  })}
                  {data.weeks.length > 0 && (
                    <tr className="border-t-2 border-white/20 font-semibold">
                      <td colSpan={2} className="px-3 py-2">{S.total}</td>
                      <td className="num px-3 py-2">{fmtMoney(data.totals.supply)}</td>
                      <td className="num px-3 py-2 text-emerald-300">{fmtMoney(data.totals.cashback)}</td>
                      <td className="num px-3 py-2 text-blue-300">{fmtMoney(data.totals.supplierPaid)}</td>
                      <td className="num px-3 py-2 text-amber-300">{fmtMoney(data.totals.cashbackPaid)}</td>
                      <td className="num px-3 py-2 text-orange-300">{fmtMoney(data.totals.supplierDebt)}</td>
                      <td className="num px-3 py-2 text-amber-300">{fmtMoney(data.totals.cashbackDebt)}</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </section>
        </>
      )}
    </>
  );
}

function Stat({ label, value, mono, bold, accent }) {
  return (
    <div className="glass rounded-xl px-4 py-3">
      <div className="text-xs text-slate-400">{label}</div>
      <div className={`mt-0.5 ${bold ? 'text-lg font-semibold' : 'text-base'} ${mono ? 'font-mono' : ''} ${accent ? 'text-emerald-300' : ''}`}>{value}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
